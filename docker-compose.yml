# docker-compose.yml
services:
  # Lumina RAG — PostgreSQL Database
  db:
    image: postgres:17-alpine
    container_name: lumina-db
    restart: always
    environment:
      POSTGRES_USER: lumina_dev
      POSTGRES_PASSWORD: lumina_password
      POSTGRES_DB: lumina_db
    ports:
      - "5433:5432"
    volumes:
      - lumina_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumina_dev -d lumina_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Lumina RAG — Redis Cache
  redis:
    image: redis:7-alpine
    container_name: lumina-redis
    restart: always
    ports:
      - "6380:6379"

  # Lumina RAG — AI Engine (Python / FastAPI)
  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    container_name: lumina-ai-engine
    restart: always
    env_file:
      - ./ai-engine/.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # Lumina RAG — Web Frontend (Next.js)
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: lumina-web
    restart: always
    environment:
      NEXT_PUBLIC_AI_ENGINE_URL: http://ai-engine:8000
      DATABASE_URL: postgresql://lumina_dev:lumina_password@db:5432/lumina_db
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      ai-engine:
        condition: service_started

  # Lumina RAG — pgAdmin
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: lumina-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@lumina.dev
      PGADMIN_DEFAULT_PASSWORD: admin_password
    ports:
      - "5051:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  lumina_db_data: